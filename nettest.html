<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ECHO-7 Network Test</title>
<style>body{background:#000;color:#0f0;font:14px monospace;padding:20px}input{background:#111;color:#0f0;border:1px solid #0f0;padding:8px;font:inherit;width:200px}button{background:#111;color:#0f0;border:1px solid #0f0;padding:8px 16px;font:inherit;cursor:pointer;margin:4px}#log{white-space:pre-wrap;margin-top:20px;border:1px solid #333;padding:10px;max-height:60vh;overflow-y:auto}</style>
</head>
<body>
<h2>ECHO-7 WebSocket Test</h2>
<div>
  <button onclick="doHost()">HOST</button>
  <button onclick="doJoin()">JOIN</button>
  <br><br>
  <input id="code" placeholder="код комнаты">
</div>
<div id="log"></div>
<script>
const SERVER = 'wss://echo7-signal.onrender.com';
let ws = null;

function log(msg) {
  const el = document.getElementById('log');
  el.textContent += new Date().toLocaleTimeString() + ' | ' + msg + '\n';
  el.scrollTop = el.scrollHeight;
}

function doHost() {
  const code = '' + Math.floor(10000000 + Math.random() * 90000000);
  document.getElementById('code').value = code;
  log('Connecting to server...');

  ws = new WebSocket(SERVER);
  ws.onopen = () => {
    log('✅ WebSocket connected');
    ws.send(JSON.stringify({ t: 'host', code, name: 'TestHost' }));
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    log('📩 ' + JSON.stringify(msg));
    if (msg.t === 'hosted') log('✅ ROOM CREATED: ' + msg.code);
    if (msg.t === 'join') log('⚡ PLAYER JOINED: ' + msg.name + ' (id: ' + msg.id + ')');
    if (msg.t === 'fromclient') log('📩 From client: ' + JSON.stringify(msg.data));
    if (msg.t === 'error') log('❌ ' + msg.error);
  };
  ws.onerror = (e) => log('❌ WebSocket error');
  ws.onclose = () => log('⚠ WebSocket closed');
}

function doJoin() {
  const code = document.getElementById('code').value.trim();
  if (!code) { log('❌ Enter code!'); return; }
  log('Connecting to server...');

  ws = new WebSocket(SERVER);
  ws.onopen = () => {
    log('✅ WebSocket connected');
    ws.send(JSON.stringify({ t: 'join', code, name: 'TestClient' }));
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    log('📩 ' + JSON.stringify(msg));
    if (msg.t === 'joined') {
      log('✅ JOINED ROOM! My ID: ' + msg.id);
      // Send test message to host
      ws.send(JSON.stringify({ t: 'tohost', data: { hello: 'from client!' } }));
    }
    if (msg.t === 'fromhost') log('📩 From host: ' + JSON.stringify(msg.data));
    if (msg.t === 'error') log('❌ ' + msg.error);
  };
  ws.onerror = (e) => log('❌ WebSocket error');
  ws.onclose = () => log('⚠ WebSocket closed');
}
</script>
</body>
</html>
